# SiliconBazaar API — monorepo deploy (backend only)
[build]
  base = "backend"
  command = "npm run netlify:build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["dist/**"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
