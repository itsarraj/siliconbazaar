# Prefer repo-root netlify.toml (base = "backend"). This file applies if Netlify base dir is set to backend.
[build]
  command = "npm run netlify:build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["dist/**"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
